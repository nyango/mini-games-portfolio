<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>漢字発掘ピクロス</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="game-card">
      <header class="titlebar">
        <div>
          <p class="eyebrow">digging nonogram</p>
          <h1>漢字発掘ピクロス</h1>
          <p id="subtitle" class="subtitle">石板を削って、隠された漢字を掘り出そう。</p>
        </div>
        <div class="actions">
          <button id="prevBtn" type="button">前</button>
          <button id="nextBtn" type="button">次</button>
          <button id="resetBtn" type="button">リセット</button>
        </div>
      </header>

      <section class="statusbar" aria-live="polite">
        <div><span>漢字</span><strong id="puzzleName">?</strong></div>
        <div><span>掘削率</span><strong id="progress">0%</strong></div>
        <div><span>ミス</span><strong id="mistakes">0</strong></div>
        <div><span>時間</span><strong id="timer">00:00</strong></div>
      </section>

      <section class="tools" role="group" aria-label="操作モード">
        <button id="digMode" class="tool active" type="button">⛏ 掘る</button>
        <button id="markMode" class="tool" type="button">✕ 印</button>
        <button id="hintBtn" class="tool" type="button">ヒント</button>
      </section>

      <section class="board-wrap">
        <div id="gridRoot" class="picross" aria-label="ピクロス盤面"></div>
        <aside class="rules">
          <h2>遊び方</h2>
          <ul>
            <li>数字は、その列/行に連続して掘るマス数です。</li>
            <li><b>掘る</b>モードで正しい石を削ると漢字の線が現れます。</li>
            <li><b>印</b>モード、または右クリックで「ここは掘らない」印を付けられます。</li>
            <li>間違って掘るとミス。全部の正解マスを掘ればクリアです。</li>
          </ul>
        </aside>
      </section>

      <div id="overlay" class="overlay hidden">
        <div class="modal">
          <p class="eyebrow">discovered</p>
          <div id="bigKanji" class="big-kanji">山</div>
          <h2 id="clearTitle">発掘完了</h2>
          <p id="clearText">隠された漢字を掘り出しました。</p>
          <button id="continueBtn" type="button">次の石板へ</button>
        </div>
      </div>
    </section>
  </main>
  <script src="game.js"></script>
</body>
</html>
