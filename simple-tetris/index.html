<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>SIMPLE TETRIS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="game-card">
      <div class="titlebar">
        <div>
          <p class="eyebrow">classic falling blocks</p>
          <h1>SIMPLE TETRIS</h1>
        </div>
        <button id="restartBtn" type="button">RESTART</button>
      </div>

      <div class="layout">
        <canvas id="board" width="300" height="600" aria-label="Tetris board"></canvas>

        <aside class="side">
          <div class="panel">
            <span>SCORE</span>
            <strong id="score">0</strong>
          </div>
          <div class="panel row">
            <div><span>LINES</span><strong id="lines">0</strong></div>
            <div><span>LEVEL</span><strong id="level">1</strong></div>
          </div>
          <div class="panel">
            <span>NEXT</span>
            <canvas id="next" width="120" height="120" aria-label="Next piece"></canvas>
          </div>
          <div class="panel help">
            <span>CONTROLS</span>
            <p>← → 移動<br>↓ ソフトドロップ<br>↑ / X 回転<br>Z 逆回転<br>Space ハードドロップ<br>P 一時停止<br><br>Touch: タップ回転 / スワイプ移動</p>
          </div>
        </aside>
      </div>

      <div id="overlay" class="overlay">
        <div class="modal">
          <h2 id="overlayTitle">SIMPLE TETRIS</h2>
          <p id="overlayText">横一列を埋めて消す、普通に楽しいやつです。</p>
          <button id="startBtn" type="button">START</button>
        </div>
      </div>
    </section>
  </main>

  <script src="game.js"></script>
</body>
</html>
